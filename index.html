    <div class="popup popup-profile">
      <div class="popup__container">
        <form class="form" name="profile-info" action="index.html" method="post">
          <h3 class="form__heading">Редактировать профиль</h3>
          <fieldset class="form__input-container">
            <input type="text" class="form__item form__item_field_title" id="profile-title" name="profile-title" value="Жак-Ив Кусто" placeholder="Имя" required>
            <input type="text" class="form__item form__item_field_subtitle" id="profile-subtitle" name="profile-subtitle" value="Исследователь океана" placeholder="О себе" required>
            <button type="submit" class="form__submit-button form__submit-button_edit-profile" value="">Сохранить</button>
          </fieldset>
        </form>
        <button type="button" class="popup__close-button" aria-label="Закрыть"></button>
      </div>
    </div>
    <div class="popup popup-place">
      <div class="popup__container">
        <form class="form" name="element-creation" action="index.html" method="post">
          <h3 class="form__heading">Новое место</h3>
          <fieldset class="form__input-container"> <!--Поправь потом value у инпутов-->
            <input type="text" class="form__item form__item_field_title" id="element-title" name="element-title" placeholder="Название" required>
            <input type="text" class="form__item form__item_field_subtitle" id="element-image" name="element-image" placeholder="Ссылка на картинку" required>
            <button type="submit" class="form__submit-button form__submit-button_create-element">Создать</button>
          </fieldset>
        </form>
        <button type="button" class="popup__close-button" aria-label="Закрыть"></button>
      </div>
    </div>
    <div class="popup popup-image">
      <div class="popup__img-container">
        <img class="popup__pic" src="" alt="">
        <p class="popup__pic-caption"></p>       
        <button type="button" class="popup__close-button" aria-label="Закрыть"></button>
      </div>
    </div>
  </div>
  <template id="element-template">
    <li class="element">
      <button type="button" class="element__bin"></button>
      <img class="element__image" src="" alt="">
      <div class="element__description">
        <h2 class="element__name"></h2>
        <button type="button" class="element__like"></button>
      </div>
    </li>
  </template>
